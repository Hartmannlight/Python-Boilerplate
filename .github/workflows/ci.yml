name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src tests
      - name: Pytest
        run: uv run pytest
